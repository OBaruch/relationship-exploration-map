services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relationship-map-app-local
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      NODE_ENV: development
    volumes:
      - ./data:/app/data
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: relationship-map-nginx-local
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
