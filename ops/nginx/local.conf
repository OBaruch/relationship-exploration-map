upstream relationship_map_app {
  server app:8080;
}

server {
  listen 80;
  server_name mapa.localhost mapa.local.test mapa.127.0.0.1.nip.io;

  location / {
    proxy_pass http://relationship_map_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80 default_server;
  server_name _;
  return 302 http://mapa.localhost$request_uri;
}
